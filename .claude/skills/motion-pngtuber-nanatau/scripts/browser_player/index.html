<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MotionPNGTuber Browser Player</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #11151c;
        --panel: #1a2230;
        --line: #2b374a;
        --text: #eef3f8;
        --sub: #a7b4c8;
        --accent: #79c0ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        background:
          radial-gradient(circle at top, rgba(121, 192, 255, 0.18), transparent 28%),
          linear-gradient(180deg, #0e141d 0%, var(--bg) 100%);
        color: var(--text);
      }

      .shell {
        width: min(960px, calc(100vw - 32px));
        margin: 24px auto;
        padding: 18px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 18px;
        background: rgba(15, 20, 28, 0.86);
        backdrop-filter: blur(12px);
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        margin-bottom: 14px;
      }

      h1 {
        margin: 0;
        font-size: 18px;
      }

      .sub {
        color: var(--sub);
        font-size: 13px;
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
        margin-bottom: 14px;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1.4fr) minmax(320px, 0.9fr);
        gap: 16px;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 10px 16px;
        font: inherit;
        color: #06121f;
        background: linear-gradient(180deg, #a5d8ff 0%, var(--accent) 100%);
        cursor: pointer;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.6;
      }

      button.secondary {
        color: var(--text);
        background: #253244;
      }

      .status {
        color: var(--sub);
        font-size: 13px;
      }

      .stage {
        overflow: hidden;
        border-radius: 18px;
        border: 1px solid var(--line);
        background: #0b0f16;
        aspect-ratio: 752 / 416;
      }

      canvas {
        display: block;
        width: 100%;
        height: auto;
      }

      .chat-panel {
        display: flex;
        flex-direction: column;
        gap: 12px;
        min-height: 0;
      }

      .chat-log {
        min-height: 320px;
        max-height: 520px;
        overflow: auto;
        padding: 12px;
        border-radius: 18px;
        border: 1px solid var(--line);
        background: rgba(5, 10, 18, 0.6);
      }

      .chat-empty {
        color: var(--sub);
        font-size: 13px;
      }

      .message {
        padding: 12px 14px;
        border-radius: 16px;
        margin-bottom: 10px;
        line-height: 1.6;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .message:last-child {
        margin-bottom: 0;
      }

      .message.user {
        background: rgba(121, 192, 255, 0.12);
        border: 1px solid rgba(121, 192, 255, 0.24);
      }

      .message.assistant {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.06);
      }

      .message.system {
        background: rgba(255, 173, 102, 0.12);
        border: 1px solid rgba(255, 173, 102, 0.24);
      }

      .message-role {
        display: block;
        margin-bottom: 6px;
        color: var(--sub);
        font-size: 12px;
      }

      .chat-form {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .chat-help {
        color: var(--sub);
        font-size: 12px;
      }

      textarea {
        width: 100%;
        min-height: 120px;
        resize: vertical;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.03);
        color: var(--text);
        font: inherit;
      }

      .chat-actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }

      .meta {
        margin-top: 12px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 10px;
      }

      .meta-item {
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.02);
      }

      .meta-label {
        color: var(--sub);
        font-size: 12px;
      }

      .meta-value {
        margin-top: 2px;
        font-size: 14px;
      }

      @media (max-width: 920px) {
        .layout {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="header">
        <div>
          <h1>MotionPNGTuber Browser Player</h1>
          <div class="sub">LLM 応答と TTS で話すブラウザプレイヤー</div>
        </div>
        <div class="sub">video + mouth sprites + mouth_track.json + app server</div>
      </div>

      <div class="controls">
        <div id="status" class="status">初期化中…</div>
      </div>

      <div class="layout">
        <div>
          <div class="stage">
            <canvas id="stage" width="752" height="416"></canvas>
          </div>

          <div class="meta">
            <div class="meta-item">
              <div class="meta-label">Mouth</div>
              <div id="mouthShape" class="meta-value">closed</div>
            </div>
            <div class="meta-item">
              <div class="meta-label">Audio Level</div>
              <div id="audioLevel" class="meta-value">0.000</div>
            </div>
            <div class="meta-item">
              <div class="meta-label">Track Frame</div>
              <div id="frameIndex" class="meta-value">0</div>
            </div>
          </div>
        </div>

        <div class="chat-panel">
          <div id="chatLog" class="chat-log">
            <div class="chat-empty">まだ会話がありません。下の欄から話しかけてください。</div>
          </div>

          <form id="chatForm" class="chat-form">
            <label class="chat-help" for="chatInput">Enter で送信、Shift + Enter で改行</label>
            <textarea
              id="chatInput"
              name="message"
              placeholder="こんにちは。今日はどんな感じ？"
            ></textarea>
            <div class="chat-actions">
              <button id="sendButton" type="submit">送信して話す</button>
              <button id="stopAudio" type="button" class="secondary">再生停止</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <audio id="ttsAudio" preload="auto" hidden></audio>
    <script type="module" src="./player.js"></script>
  </body>
</html>
